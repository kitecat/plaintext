name: PlainText
description: "Convert Markdown-formatted text from chatbots to plain text for easy sharing in messengers."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  markdown: ^7.2.2
  flutter_markdown_plus: ^1.0.7
  shared_preferences: ^2.2.2
  share_plus: ^12.0.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#97B0ED"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  # Optional: different icons for each platform
  # image_path_android: "assets/icon/icon_android.png"
  # image_path_ios: "assets/icon/icon_ios.png"